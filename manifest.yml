modules:
  jira:adminPage:
    - key: worklog-reminder-admin
      resource: main
      resolver:
        function: resolver
      title: Worklog Reminder Settings
  
  scheduledTrigger:
    - key: daily-worklog-scan
      function: dailyScan
      interval: day
  
  function:
    - key: dailyScan
      handler: index.dailyScanHandler
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/hello-world/build

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - storage:app
  external:
    fetch:
      backend:
        - https://api.sendgrid.com/*

app:
  runtime:
    name: nodejs24.x
    memoryMB: 512
    architecture: arm64
  id: ari:cloud:ecosystem::app/3c133f71-293b-416b-92b3-4233fe3935f5

modules:
  jira:adminPage:
    - key: worklog-reminder-admin
      resource: main
      resolver:
        function: resolver
      title: Worklog Reminder Settings
  
  trigger:
    - key: daily-worklog-scan
      function: dailyScan
      schedule: cron(30 17 * * ? *)
  
  function:
    - key: dailyScan
      handler: index.dailyScanHandler
      runtime: nodejs24.x
      memoryMB: 512
      timeout: 300
    - key: resolver
      handler: index.handler
      runtime: nodejs24.x
      memoryMB: 512

resources:
  - key: main
    path: static/hello-world/build

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:jira-work-management:configuration
    - storage:app
    - external:email

app:
  runtime:
    name: nodejs24.x
    memoryMB: 512
    architecture: arm64
  id: ari:cloud:ecosystem::app/3c133f71-293b-416b-92b3-4233fe3935f5
